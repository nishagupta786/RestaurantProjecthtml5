<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Tasty Food Restaurant</title>
</head>

<body>

    <!-- Header Section -->
    <header>

        <!-- Restaurant Logo -->
        <figure align="center">
            <img src="logo.png" alt="Restaurant Logo" width="120" height="120">
            <figcaption><b>Tasty Food Restaurant</b></figcaption>
        </figure>

        <h1 align="center">🍴 Tasty Food Restaurant 🍴</h1>
        <p align="center">Contact Us</p>

        <hr>

    </header>

    <!-- Navigation Menu -->
    <nav align="center">
        <a href="index.html">Home</a> |
        <a href="menu.html">Menu</a> |
        <a href="gallery.html">Gallery</a> |
        <a href="contact.html">Contact</a>
    </nav>

    <hr>

    <!-- Main Content -->
    <main>

        <!-- Contact Form Section -->
        <section>

            <h2>Contact Form</h2>

            <form action="#" method="post">

                <!-- Full Name -->
                <label for="fullname">Full Name:</label><br>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

                <br><br>

                <!-- Email -->
                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <br><br>

                <!-- Phone -->
                <label for="phone">Phone Number:</label><br>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">

                <br><br>

                <!-- Gender -->
                <label>Gender:</label><br>

                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <br><br>

                <!-- Favourite Food -->
                <label>Favourite Food:</label><br>

                <input type="checkbox" id="pizza" name="food" value="Pizza">
                <label for="pizza">Pizza</label>

                <input type="checkbox" id="burger" name="food" value="Burger">
                <label for="burger">Burger</label>

                <input type="checkbox" id="pasta" name="food" value="Pasta">
                <label for="pasta">Pasta</label>

                <br><br>

                <!-- City -->
                <label for="city">Select City:</label><br>

                <select id="city" name="city">
                    <option>Select City</option>
                    <option>Patiala</option>
                    <option>Chandigarh</option>
                    <option>Ludhiana</option>
                    <option>Amritsar</option>
                </select>

                <br><br>

                <!-- Message -->
                <label for="message">Your Message:</label><br>

                <textarea id="message" name="message" rows="5" cols="40" placeholder="Write your message here"></textarea>

                <br><br>

                <!-- Buttons -->
                <input type="submit" value="Send Message">
                <input type="reset" value="Clear Form">

            </form>

        </section>

    </main>

    <hr>

    <!-- Footer Section -->
    <footer align="center">

        <p><b>Tasty Food Restaurant</b></p>

        <p>📍 Model Town, Patiala</p>

        <p>📞 +91 98765 43210</p>

        <p>📧 tastyfood@email.com</p>

        <p>&copy; 2026 Tasty Food Restaurant. All Rights Reserved.</p>

    </footer>

</body>

</html>
